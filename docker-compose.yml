services:
  postgres:
    image: postgres:16-alpine
    container_name: nasdaq-research-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nasdaq_research
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
